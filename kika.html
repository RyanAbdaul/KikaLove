<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Kika</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }
  #stage {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #btn {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: #fff;
    border: none;
    cursor: pointer;
    box-shadow: 0 0 20px #fff, 0 0 60px #fff, 0 0 100px rgba(255,255,255,0.6);
    color: #000;
    font-size: 16px;
    letter-spacing: 1px;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #btn:hover {
    box-shadow: 0 0 30px #fff, 0 0 80px #fff, 0 0 140px rgba(255,255,255,0.8);
  }
  #btn.hide {
    opacity: 0;
    transform: scale(0.5);
    pointer-events: none;
  }
  #heart-container {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
  }
  .word {
    position: absolute;
    color: #ff1a3d;
    font-size: 12px;
    opacity: 0;
    white-space: nowrap;
    transform: translate(-50%, -50%);
    animation: fadein 1.2s ease forwards;
    text-shadow: 0 0 8px #ff1a3d, 0 0 16px rgba(255,26,61,0.7);
  }
  @keyframes fadein {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  #heart-container.fade-out {
    transition: opacity 1.5s ease;
    opacity: 0;
  }
  #star-container {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 2s ease;
  }
  #star-container.show {
    opacity: 1;
  }
  .star {
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #ffd400;
    box-shadow: 0 0 8px #ffd400, 0 0 16px rgba(255,212,0,0.6);
    transition: box-shadow 0.3s ease, transform 0.3s ease;
    pointer-events: auto;
    cursor: pointer;
    animation: floatstar 6s ease-in-out infinite;
  }
  @keyframes floatstar {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(var(--fx1), var(--fy1)); }
    50%  { transform: translate(var(--fx2), var(--fy2)); }
    75%  { transform: translate(var(--fx1), var(--fy2)); }
    100% { transform: translate(0, 0); }
  }
  .star:hover {
    animation-play-state: paused;
    box-shadow: 0 0 16px #ffd400, 0 0 36px #ffd400, 0 0 60px rgba(255,212,0,0.8);
    transform: scale(1.3) !important;
  }
  .zoom-circle {
    position: fixed;
    background: #ffd400;
    box-shadow: 0 0 40px #ffd400, 0 0 100px rgba(255,212,0,0.8);
    border-radius: 50%;
    transition: all 0.9s ease;
    z-index: 998;
    pointer-events: none;
  }
  #image-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    z-index: 999;
  }
  #image-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  #image-overlay img {
    max-width: 55%;
    max-height: 82%;
    border-radius: 10px;
    box-shadow: 0 0 40px rgba(255,212,0,0.4);
  }
  #scene-container {
    width: 220px;
    flex-shrink: 0;
  }
  #scene-container svg {
    width: 100%;
    height: auto;
  }
  .stick { stroke: #fff; stroke-width: 4; stroke-linecap: round; fill: none; }
  .stick-girl { stroke: #ff8fb3; }
  .bob-a { animation: bob 2.6s ease-in-out infinite; }
  .bob-b { animation: bob 2.6s ease-in-out infinite 0.3s; }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  .float-heart { animation: floatup 2.4s ease-in-out infinite; }
  @keyframes floatup {
    0% { opacity: 0; transform: translateY(0) scale(0.6); }
    30% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-30px) scale(1); }
  }
  #image-close {
    position: absolute;
    top: 24px;
    right: 32px;
    color: #ff1a3d;
    font-size: 30px;
    cursor: pointer;
    text-shadow: 0 0 10px #ff1a3d;
    background: none;
    border: none;
  }
  #message {
    position: absolute;
    max-width: 60%;
    text-align: center;
    color: #ff1a3d;
    font-size: 22px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 1.2s ease;
    text-shadow: 0 0 10px #ff1a3d, 0 0 24px rgba(255,26,61,0.7);
  }
  #message.show {
    opacity: 1;
  }
</style>
</head>
<body>
<div id="stage">
  <button id="btn">click</button>
  <div id="heart-container"></div>
  <div id="star-container"></div>
  <div id="message"></div>
  <audio id="bgm" src="song.mp3" loop></audio>
</div>

<div id="image-overlay">
  <button id="image-close">&times;</button>
  <div id="scene-container"></div>
  <img id="overlay-img" src="" alt="">
</div>

<script>
const btn = document.getElementById('btn');
const container = document.getElementById('heart-container');
const starContainer = document.getElementById('star-container');
const messageEl = document.getElementById('message');
const bgm = document.getElementById('bgm');
const imageOverlay = document.getElementById('image-overlay');
const overlayImg = document.getElementById('overlay-img');
const sceneContainer = document.getElementById('scene-container');
const imageClose = document.getElementById('image-close');

imageClose.addEventListener('click', () => {
  imageOverlay.classList.remove('show');
});
imageOverlay.addEventListener('click', (e) => {
  if (e.target === imageOverlay) imageOverlay.classList.remove('show');
});

function heartPoint(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
  return { x, y };
}

function getHeartPoints(steps) {
  const pts = [];
  for (let i = 0; i < steps; i++) {
    const t = (i / steps) * Math.PI * 2;
    pts.push(heartPoint(t));
  }
  return pts;
}

function figure(x, y, isGirl, pose) {
  const cls = 'stick' + (isGirl ? ' stick-girl' : '');
  const hx = x, hy = y;
  const neck = y + 16;
  const hip = y + 60;
  let arms = '', legs = '', extra = '';

  if (pose === 'sit') {
    legs = `<path class="${cls}" d="M${x} ${hip} L${x - (isGirl ? -14 : 14)} ${hip + 26} M${x} ${hip} L${x + (isGirl ? -6 : 6)} ${hip + 26}" />`;
    arms = `<path class="${cls}" d="M${x} ${neck + 10} L${x + (isGirl ? -30 : 30)} ${neck + 28}" />`;
  } else if (pose === 'stand') {
    legs = `<path class="${cls}" d="M${x} ${hip} L${x - 10} ${hip + 36} M${x} ${hip} L${x + 10} ${hip + 36}" />`;
    arms = `<path class="${cls}" d="M${x} ${neck + 8} L${x + (isGirl ? -26 : 26)} ${neck + 26}" />`;
  } else if (pose === 'lie') {
    legs = `<path class="${cls}" d="M${x} ${hip} L${x - 30} ${hip + 4} M${x} ${hip} L${x - 44} ${hip - 8}" />`;
    arms = `<path class="${cls}" d="M${x} ${neck + 6} L${x + 20} ${neck - 2}" />`;
  }
  if (isGirl) {
    extra = `<path class="stick stick-girl" d="M${x - 12} ${y - 12} Q${x} ${y - 22} ${x + 12} ${y - 12}" />`;
  }
  return `
    ${legs}
    <path class="${cls}" d="M${x} ${neck} L${x} ${hip}" />
    ${arms}
    ${extra}
    <circle class="${cls}" cx="${hx}" cy="${hy}" r="14" />
  `;
}

function heart(x, y, delay) {
  return `<path class="float-heart" style="animation-delay:${delay}s" fill="#ff1a3d" d="M${x} ${y+6} C${x-8} ${y-4} ${x-20} ${y-2} ${x-20} ${y+8} C${x-20} ${y+16} ${x-8} ${y+20} ${x} ${y+28} C${x+8} ${y+20} ${x+20} ${y+16} ${x+20} ${y+8} C${x+20} ${y-2} ${x+8} ${y-4} ${x} ${y+6} Z" />`;
}

function buildScene(index) {
  const cx1 = 165, cx2 = 235, cy = 120;
  let svgBody = '';
  switch (index) {
    case 1:
      svgBody = `
        <line class="stick" x1="60" y1="196" x2="340" y2="196" />
        <g class="bob-a">${figure(cx1, cy, false, 'sit')}</g>
        <g class="bob-b">${figure(cx2, cy, true, 'sit')}</g>
        <path class="stick" d="M${cx1+30} ${cy+28} L${cx2-30} ${cy+28}" />
      `;
      break;
    case 2:
      svgBody = `
        <g class="bob-a">${figure(cx1+15, cy, false, 'stand')}</g>
        <g class="bob-b">${figure(cx2-15, cy, true, 'stand')}</g>
        <path class="stick" d="M${cx1+29} ${cy+18} Q200 ${cy+40} ${cx2-29} ${cy+18}" />
        <path class="stick stick-girl" d="M${cx1+29} ${cy+30} Q200 ${cy+52} ${cx2-29} ${cy+30}" />
        ${heart(200, 40, 0)}
      `;
      break;
    case 3:
      svgBody = `
        <g class="bob-a">${figure(cx1+22, cy, false, 'stand')}</g>
        <g class="bob-b">${figure(cx2-22, cy, true, 'stand')}</g>
        <path class="stick" d="M${cx1+36} ${cy+18} L${cx2-36} ${cy+18}" />
        ${heart(200, 70, 0)}
        ${heart(180, 90, 0.6)}
        ${heart(220, 90, 1.2)}
      `;
      break;
    case 4:
      svgBody = `
        <g class="bob-a">${figure(cx1, cy, false, 'stand')}</g>
        <g class="bob-b">${figure(cx2, cy, true, 'stand')}</g>
        <path class="stick" d="M${cx1+14} ${cy+2} L${cx2-14} ${cy+2}" />
        ${heart(200, 50, 0)}
      `;
      break;
    case 5:
      svgBody = `
        <circle cx="80" cy="40" r="2" fill="#ffd400" /><circle cx="130" cy="20" r="2" fill="#ffd400" />
        <circle cx="300" cy="30" r="2" fill="#ffd400" /><circle cx="340" cy="55" r="2" fill="#ffd400" />
        <g class="bob-a">${figure(140, 150, false, 'lie')}</g>
        <g class="bob-b">${figure(230, 150, true, 'lie')}</g>
      `;
      break;
    case 6:
      svgBody = `
        <line class="stick" x1="40" y1="196" x2="360" y2="196" />
        <g class="bob-a">${figure(cx1, cy, false, 'stand')}</g>
        <g class="bob-b">${figure(cx2, cy, true, 'stand')}</g>
        <path class="stick" d="M${cx1+26} ${cy+26} L${cx2-26} ${cy+26}" />
      `;
      break;
    case 7:
      svgBody = `
        <g class="bob-a">${figure(cx1+20, cy, false, 'stand')}</g>
        <g class="bob-b">${figure(cx2-20, cy, true, 'stand')}</g>
        ${heart(200, cy-30, 0)}
      `;
      break;
    default:
      svgBody = `
        <g class="bob-a">${figure(cx1+15, cy, false, 'stand')}</g>
        <g class="bob-b">${figure(cx2-15, cy, true, 'stand')}</g>
        <path class="stick" d="M${cx1+29} ${cy+18} Q200 ${cy+44} ${cx2-29} ${cy+18}" />
        ${heart(200, 40, 0)}
        ${heart(160, 70, 0.5)}
        ${heart(240, 70, 1)}
      `;
  }
  return `<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg">${svgBody}</svg>`;
}

function openStar(star, sceneIndex) {
  const rect = star.getBoundingClientRect();
  const zoom = document.createElement('div');
  zoom.className = 'zoom-circle';
  zoom.style.left = rect.left + 'px';
  zoom.style.top = rect.top + 'px';
  zoom.style.width = rect.width + 'px';
  zoom.style.height = rect.height + 'px';
  document.body.appendChild(zoom);

  requestAnimationFrame(() => {
    const size = Math.max(window.innerWidth, window.innerHeight) * 2.2;
    zoom.style.left = (window.innerWidth / 2 - size / 2) + 'px';
    zoom.style.top = (window.innerHeight / 2 - size / 2) + 'px';
    zoom.style.width = size + 'px';
    zoom.style.height = size + 'px';
  });

  zoom.addEventListener('transitionend', () => {
    overlayImg.style.display = 'block';
    const imgPath = 'images/star' + (((sceneIndex - 1) % 8) + 1) + '.jpg';
    overlayImg.onerror = () => {
      console.warn('Could not load image at: ' + imgPath);
      overlayImg.style.display = 'none';
    };
    overlayImg.src = imgPath;
    sceneContainer.style.display = 'block';
    sceneContainer.innerHTML = buildScene(sceneIndex);
    const onLeft = sceneIndex % 2 === 0;
    sceneContainer.style.order = onLeft ? '0' : '2';
    overlayImg.style.order = '1';
    imageOverlay.classList.add('show');
    setTimeout(() => zoom.remove(), 300);
  }, { once: true });
}

function makeStars(count) {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const margin = 80;
  for (let i = 0; i < count; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = (margin + Math.random() * (w - margin * 2)) + 'px';
    star.style.top = (margin + Math.random() * (h - margin * 2)) + 'px';
    const fx1 = (Math.random() * 40 - 20).toFixed(0) + 'px';
    const fy1 = (Math.random() * 40 - 20).toFixed(0) + 'px';
    const fx2 = (Math.random() * 40 - 20).toFixed(0) + 'px';
    const fy2 = (Math.random() * 40 - 20).toFixed(0) + 'px';
    star.style.setProperty('--fx1', fx1);
    star.style.setProperty('--fy1', fy1);
    star.style.setProperty('--fx2', fx2);
    star.style.setProperty('--fy2', fy2);
    star.style.animationDuration = (5 + Math.random() * 4) + 's';
    star.style.animationDelay = (Math.random() * 3) + 's';
    star.addEventListener('click', () => openStar(star, (i % 8) + 1));
    starContainer.appendChild(star);
  }
}

const messages = [
  "You are the heart of my life"
];

"My chest tightens... breathing becomes hard",
"Thinking becomes hard",

"They feel like lava dripping on my heart",
"Like boiling water",
"Please... please, Habibti",
"Darling... kitten... princess",
"My shelter... my soul... my baby",
"My heart... my life... my little girl",
"Sweetie... cutie",
"Please forgive me for breaking your heart",

"Never stop feeling jealous when I talk to a girl",
"Never stop messing with me",
"Never stop bothering me",
"Never doubt my love for you",

"You are always here... yes, here",

const holdTime = 200;
const fadeTime = 50;

function showNext(i) {
  if (i >= messages.length) {
    setTimeout(() => {
      container.classList.add('fade-out');
      setTimeout(() => {
        makeStars(20);
        starContainer.classList.add('show');
      }, 1500);
    }, fadeTime);
    return;
  }
  messageEl.textContent = messages[i];
  requestAnimationFrame(() => {
    messageEl.classList.add('show');
  });
  setTimeout(() => {
    messageEl.classList.remove('show');
    setTimeout(() => showNext(i + 1), fadeTime);
  }, holdTime);
}

btn.addEventListener('click', () => {
  btn.classList.add('hide');
  bgm.play().catch(() => {});

  const w = window.innerWidth;
  const h = window.innerHeight;
  const cx = w / 2;
  const cy = h / 2;
  const scale = Math.min(w, h) / 34;

  const points = getHeartPoints(60);

  let i = 0;
  const interval = setInterval(() => {
    if (i >= points.length) {
      clearInterval(interval);
      messageEl.textContent = "I love you Kika";
      requestAnimationFrame(() => {
        messageEl.classList.add('show');
      });
      setTimeout(() => {
        messageEl.classList.remove('show');
        setTimeout(() => showNext(0), fadeTime);
      }, holdTime);
      return;
    }
    const p = points[i];
    const word = document.createElement('div');
    word.className = 'word';
    word.textContent = "I love you Kika";
    word.style.left = (cx + p.x * scale) + 'px';
    word.style.top = (cy - p.y * scale) + 'px';
    container.appendChild(word);
    i++;
  }, 180);
});
</script>
</body>
</html>
